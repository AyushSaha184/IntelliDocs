# Example Render.com Blueprint for RAG Assistant
# Copy and edit as needed for your deployment
# See https://render.com/docs/infrastructure-as-code for details

databases:
  - name: rag-assistant-db
    databaseName: rag_db
    user: rag_user
    region: singapore
    plan: free

services:
  - type: web
    name: rag-assistant
    env: docker
    region: singapore
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    dockerCommand: sh -c "uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8000}"
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rag-assistant-db
          property: connectionString
      - key: POSTGRES_HOST
        fromDatabase:
          name: rag-assistant-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: rag-assistant-db
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: rag-assistant-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: rag-assistant-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: rag-assistant-db
          property: password
      # NVIDIA Embedding API 
      - key: EMBEDDING_PROVIDER
        value: nvidia
      - key: EMBEDDING_MODEL
        value: baai/bge-m3
      - key: EMBEDDING_DIMENSION
        value: "1024"
      - key: EMBEDDING_NORMALIZE
        value: "true"
      # OpenRouter LLM Configuration
      - key: LLM_PROVIDER
        value: openrouter
      - key: LLM_MODEL
        value: nvidia/nemotron-3-nano-30b-a3b:free
      - key: LLM_TEMPERATURE
        value: "0.7"
      - key: LLM_MAX_TOKENS
        value: "4000"
      - key: OPENROUTER_API_KEY
        sync: false  # Set this manually in Render dashboard
      - key: NVIDIA_API_KEY
        sync: false  # REQUIRED — set in Render dashboard (used for embeddings & reranking)
      - key: OPENROUTER_SITE_URL
        value: https://rag-assistant.onrender.com
      - key: OPENROUTER_SITE_NAME
        value: RAG_Assistant
      # Reranker Configuration
      - key: USE_RERANKER
        value: "true"
      - key: RERANKER_MODEL
        value: nv-rerank-qa-mistral-4b:1
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONPATH
        value: /app
    disk:
      name: rag-data
      mountPath: /app/data
      sizeGB: 5
