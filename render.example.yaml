# Example Render.com Blueprint for RAG Assistant
# Copy and edit as needed for your deployment
# See https://render.com/docs/infrastructure-as-code for details

services:
  - type: web
    name: rag-assistant
    env: docker
    region: singapore
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    dockerCommand: sh -c "uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8000}"
    healthCheckPath: /api/health
    envVars:
      # Supabase Postgres (set manually in Render dashboard)
      - key: DATABASE_URL
        sync: false
      - key: POSTGRES_SSLMODE
        value: require
      - key: VECTOR_BACKEND
        value: qdrant
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION
        value: chunk_embeddings
      - key: QDRANT_DISTANCE
        value: cosine
      - key: QDRANT_TIMEOUT_SECONDS
        value: "10"
      - key: STORAGE_BACKEND
        value: supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: rag-documents
      - key: AUTH_REQUIRED
        value: "true"
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Set to your Vercel frontend URL

      # API protection
      - key: RATE_LIMIT_REQUESTS
        value: "5"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"

      # Circuit breaker
      - key: CIRCUIT_BREAKER_FAILURE_THRESHOLD
        value: "10"
      - key: CIRCUIT_BREAKER_RECOVERY_SECONDS
        value: "120"

      # NVIDIA Embedding API 
      - key: EMBEDDING_PROVIDER
        value: nvidia
      - key: EMBEDDING_MODEL
        value: baai/bge-m3
      - key: EMBEDDING_DIMENSION
        value: "1024"
      - key: EMBEDDING_NORMALIZE
        value: "true"
      # OpenRouter LLM Configuration
      - key: LLM_PROVIDER
        value: openrouter
      - key: LLM_MODEL
        value: qwen/qwen3-235b-a22b-thinking-2507
      - key: LLM_TEMPERATURE
        value: "0.7"
      - key: LLM_MAX_TOKENS
        value: "1000"
      - key: OPENROUTER_API_KEY
        sync: false  # Set this manually in Render dashboard
      - key: NVIDIA_API_KEY
        sync: false  # REQUIRED — set in Render dashboard (used for embeddings & reranking)
      # Judge LLM Configuration
      - key: JUDGE_PROVIDER
        value: cerebras
      - key: JUDGE_MODEL
        value: llama3.1-8b
      - key: CEREBRAS_API_KEY
        sync: false # Set in Render dashboard
      - key: OPENROUTER_SITE_URL
        value: https://rag-assistant.onrender.com
      - key: OPENROUTER_SITE_NAME
        value: RAG_Assistant
      # Reranker Configuration
      - key: USE_RERANKER
        value: "true"
      - key: RERANKER_MODEL
        value: nv-rerank-qa-mistral-4b:1

      - key: PYTHONUNBUFFERED
        value: "1"

      - key: PYTHONPATH
        value: /app
    disk:
      name: rag-data
      mountPath: /app/data
      sizeGB: 5
