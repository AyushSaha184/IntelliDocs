services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: rag_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RAG Backend + Frontend ──
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database (points to the 'db' service above)
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/rag_db

      # Embedding: use NVIDIA API (consistent with Render)
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-nvidia}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-baai/bge-m3}
      EMBEDDING_DIMENSION: "1024"

      # Reranker: use NVIDIA API
      RERANKER_PROVIDER: ${RERANKER_PROVIDER:-nvidia}
      RERANKER_MODEL: ${RERANKER_MODEL:-nv-rerank-qa-mistral-4b:1}
      USE_RERANKER: "true"

      # LLM: use OpenRouter as default
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      LLM_MODEL: ${LLM_MODEL:-nvidia/nemotron-3-nano-30b-a3b:free}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}

      # Python
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
    volumes:
      # Persist session data across container restarts
      - app_data:/app/data

volumes:
  pgdata:
  app_data:
