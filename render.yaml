# Render.com Blueprint for RAG Assistant
# Deploy via: Render Dashboard → New → Blueprint → Connect repo

databases:
  - name: rag-assistant-db
    databaseName: rag_db
    user: rag_user
    region: singapore
    plan: free

services:
  # Web Service
  - type: web
    name: rag-assistant
    env: docker
    region: singapore
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    dockerCommand: sh -c "uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8000}"
    healthCheckPath: /api/health

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rag-assistant-db
          property: connectionString

      - key: POSTGRES_HOST
        fromDatabase:
          name: rag-assistant-db
          property: host

      - key: POSTGRES_PORT
        fromDatabase:
          name: rag-assistant-db
          property: port

      - key: POSTGRES_DB
        fromDatabase:
          name: rag-assistant-db
          property: database

      - key: POSTGRES_USER
        fromDatabase:
          name: rag-assistant-db
          property: user

      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: rag-assistant-db
          property: password

      # Local Embedding Model (downloaded during Docker build)
      - key: EMBEDDING_PROVIDER
        value: local

      - key: EMBEDDING_MODEL
        value: BAAI/bge-m3

      - key: EMBEDDING_NORMALIZE
        value: "true"

      # OpenRouter LLM Configuration
      - key: LLM_PROVIDER
        value: openrouter

      - key: LLM_MODEL
        value: deepseek/deepseek-r1-0528:free

      - key: LLM_TEMPERATURE
        value: "0.7"

      - key: LLM_MAX_TOKENS
        value: "4000"

      - key: OPENROUTER_API_KEY
        sync: false  # Set this manually in Render dashboard

      - key: GEMINI_API_KEY
        sync: false  # Set this manually in Render dashboard (optional)

      - key: OPENROUTER_SITE_URL
        value: https://rag-assistant.onrender.com

      - key: OPENROUTER_SITE_NAME
        value: RAG_Assistant

      - key: USE_RERANKER
        value: "false"

      - key: PYTHONUNBUFFERED
        value: "1"

      - key: PYTHONPATH
        value: /app

    # Disk storage for uploaded documents and vector store
    disk:
      name: rag-data
      mountPath: /app/data
      sizeGB: 5